<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pasang — A Himalayan Adventure</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #10141f;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
  }
  #touch {
    position: fixed; inset: 0; pointer-events: none; display: none;
  }
  .tbtn {
    position: absolute; pointer-events: auto;
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.10); border: 2px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.6); font: bold 18px sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .tbtn:active { background: rgba(255,255,255,0.28); }
  #t-left  { left: 18px;  bottom: 30px; }
  #t-right { left: 104px; bottom: 30px; }
  #t-down  { left: 61px;  bottom: 96px; width: 50px; height: 50px; }
  #t-jump  { right: 18px;  bottom: 44px; width: 76px; height: 76px; }
  #t-run   { right: 110px; bottom: 24px; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="384" height="240"></canvas></div>
<div id="touch">
  <div class="tbtn" id="t-left">&#9664;</div>
  <div class="tbtn" id="t-right">&#9654;</div>
  <div class="tbtn" id="t-down">&#9660;</div>
  <div class="tbtn" id="t-run">B</div>
  <div class="tbtn" id="t-jump">A</div>
</div>
<script src="js/util.js"></script>
<script src="js/input.js"></script>
<script src="js/audio.js"></script>
<script src="js/music.js"></script>
<script src="js/font.js"></script>
<script src="js/sprites.js"></script>
<script src="js/sprites_enemies.js"></script>
<script src="js/backgrounds.js"></script>
<script src="js/tiles.js"></script>
<script src="js/entity.js"></script>
<script src="js/player.js"></script>
<script src="js/items.js"></script>
<script src="js/enemies.js"></script>
<script src="js/hazards.js"></script>
<script src="js/bosses.js"></script>
<script src="js/leveldata1.js"></script>
<script src="js/leveldata2.js"></script>
<script src="js/leveldata3.js"></script>
<script src="js/level.js"></script>
<script src="js/hud.js"></script>
<script src="js/save.js"></script>
<script src="js/scenes.js"></script>
<script src="js/main.js"></script>
</body>
</html>
